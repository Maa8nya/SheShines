<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheShines Learning Options</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fdf6f0;
            margin: 0;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #6d1453;
            padding: 10px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }
        .navbar .logo {
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.3s ease-in-out;
        }
        .navbar .logo:hover {
            transform: scale(1.1);
        }
        .navbar .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
        }
        .navbar .nav-links li {
            display: inline;
        }
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        .navbar .nav-links a:hover {
            color: #f8bbd0;
        }
        h1 {
            color: #6d1453;
            margin-top: 20px;
            animation: slideDown 1s ease-in-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .option {
            width: 40%;
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }
        .option:hover {
            transform: scale(1.05);
        }
        .option img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: opacity 0.3s ease;
        }
        .option img:hover {
            opacity: 0.8;
        }
        .option h2 {
            margin-top: 10px;
            color: #000;
            font-size: 20px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            color: #6d1453;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #f8bbd0;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
            animation: fadeIn 1s ease-in-out;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SheShines</div>
        <ul class="nav-links">
            <li><a href="homepage.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="profilepage.html">Profile</a></li>
        </ul>
    </nav>
    <h1>Choose the way you want to learn</h1>
    <div class="container">
        <div class="option">
            <img src="I1.png.png" alt="customized learning">
            <h2><a href="graphicsdesignexpert.html">Customized Learning</a></h2>
        </div>
        <div class="option">
            <img src="i2.hack.png" alt="Learning through Resources">
            <h2>Learning through Resources</h2>
        </div>
    </div>
    <a href="homepage.html" class="back-link">Back</a>
    <div class="footer">© 2024 SheShines. All rights reserved.</div>
</body>
</html>
