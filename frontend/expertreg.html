<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheShines - Expert Registration</title>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background: linear-gradient(to right, #ffafbd, #ffc3a0);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            animation: fadeIn 1s ease-in-out;
        }

        .navbar {
            background: rgba(248, 183, 212, 0.6);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            font-size: 26px;
            font-weight: bold;
            color: black;
            margin: 0;
        }

        .nav-links a {
            color: black;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .nav-links a:hover {
            color: #8c004b;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .container {
            display: flex;
            flex-direction: column; /* Center everything in a column */
            align-items: center;
            text-align: center;
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .image-container img {
            width: 100%;
            max-width: 250px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .registration-box {
            background: rgba(255, 255, 255, 0.3);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            animation: fadeIn 1.2s ease-in-out;
            text-align: left;
        }

        .registration-box h2 {
            text-align: center;
            color: black;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .registration-box label {
            font-weight: bold;
            color: black;
            display: block;
            margin-top: 10px;
        }

        .registration-box input, .registration-box textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.6);
        }

        .submit-btn {
            background: linear-gradient(to right, #b03962, #ff6b81);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }

        .submit-btn:hover {
            background: linear-gradient(to right, #ff6b81, #b03962);
        }

        .footer {
            background: rgba(248, 183, 212, 0.7);
            padding: 20px;
            text-align: center;
            margin-top: auto;
            backdrop-filter: blur(10px);
        }

        .footer p {
            font-size: 16px;
            color: black;
            margin: 0;
        }
    </style>
     <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'hi,kn,ta,te',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.querySelector(".submit-btn").addEventListener("click", function () {
                const fileInput = document.getElementById("upload-image");
                const file = fileInput.files[0];

                const reader = new FileReader();
                reader.onload = function (event) {
                    const imageData = event.target.result;

                    const formData = {
                        name: document.getElementById("name").value,
                        profession: document.getElementById("profession").value,
                        qualification: document.getElementById("qualification").value,
                        experience: document.getElementById("experience").value,
                        package_range: document.getElementById("package").value,
                        work_environment: document.getElementById("work-environment").value,
                        market_status: document.getElementById("market-status").value,
                        reviews: document.getElementById("review").value,
                        image: imageData
                    };

                    sessionStorage.setItem("expertData", JSON.stringify(formData));
                    alert("✅ Registration Successful! Your data has been stored.");
                };

                if (file) {
                    reader.readAsDataURL(file);
                } else {
                    reader.onload();
                }
            });
        });
    </script>
</head>
<body>
    <div class="navbar">
        <h1>SheShines</h1>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </div>
    <!-- Language Selector -->
    <div class="translate-container">
        <label for="language">Translate: </label>
        <div id="google_translate_element"></div>
    </div>

    <div class="content">
        <div class="container">
            <div class="image-container">
                <img src="ss1.1.png" alt="Expert Registration 1">
            </div>

            <div class="registration-box">
                <h2>Expert Registration</h2>
                
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name...">
                
                <label for="profession">Profession:</label>
                <input type="text" id="profession" placeholder="Enter your profession...">
                
                <label for="qualification">Qualification:</label>
                <input type="text" id="qualification" placeholder="Enter your qualification...">
                
                <label for="experience">Experience:</label>
                <input type="text" id="experience" placeholder="Enter your experience...">
                
                <label for="package">Package Range:</label>
                <input type="text" id="package" placeholder="Enter package range...">
                
                <label for="work-environment">Work Environment:</label>
                <input type="text" id="work-environment" placeholder="Enter work environment details...">
                
                <label for="market-status">Market Status:</label>
                <input type="text" id="market-status" placeholder="Enter market status...">
                
                <label for="review">Review:</label>
                <textarea id="review" placeholder="Write your review..."></textarea>

                <label for="upload-image">Upload Image:</label>
                <input type="file" id="upload-image" accept="image/*">

                <button class="submit-btn">Submit</button>
            </div>

            <div class="image-container">
                <img src="ss2.png" alt="Expert Registration 2">
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 SheShines. All Rights Reserved.</p>
    </div>
</body>
</html>
