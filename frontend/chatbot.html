<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheShines - Chatbot & Categories</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: rgba(248, 183, 212, 0.3);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background-color: #f8b7d4;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            font-size: 24px;
            font-weight: bold;
            color: black;
            margin: 0;
        }
        .nav-links a {
            color: black;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 50px;
        }
        .chatbot-container {
            background-color: pink;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            margin-top: 50px;
        }
        .chatbot-container select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #f8b7d4;
        }
        .category-container {
            display: none;
            text-align: center;
            margin-top: 30px;
        }
        .box-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-bottom: 50px;
        }
        .box {
            background-color: pink;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }
        .box img {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
        }
        .box p {
            margin-top: 10px;
            font-weight: bold;
            color: black;
        }
        .footer {
            background-color: #f8b7d4;
            padding: 20px;
            text-align: center;
            margin-top: auto;
        }
        .footer p {
            font-size: 16px;
            color: black;
            margin: 0;
        }
    </style>
    <script>
        function showCategory() {
            document.getElementById('category-section').style.display = 'block';
        }
        
    </script>
</head>
<body>
    <div class="navbar">
        <h1>SheShines</h1>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact Us</a>
            <a href="#">Profile</a>
        </div>
    </div>

    <div class="content">
        <div class="chatbot-container">
            <h2 style="color: black;">Chatbot</h2>
            <select onchange="showCategory()">
                <option>Select from here</option>
                <option>Coding</option>
                <option>Fashion Designing</option>
                <option>Organic Farming</option>
            </select>
        </div>
    </div>

    <div id="category-section" class="category-container">
        <h2>Selected Category</h2>
        <div class="box-container">
            <div class="box">
                <img src="i13.png" alt="Startup Idea">
                <p>Startup Idea</p>
            </div>
            <div class="box">
                <img src="i14.png" alt="Networking Prospects">
                <p>Networking Prospects</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 SheShines. All Rights Reserved.</p>
    </div>
</body>
</html>
